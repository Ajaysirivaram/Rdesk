[phases.setup]
nixPkgs = ["python39", "pip"]

[phases.install]
cmds = ["cd fullstack/backend && pip install -r requirements.txt"]

[phases.build]
cmds = ["cd fullstack/backend && python manage.py collectstatic --noinput"]

[start]
cmd = "cd fullstack/backend && python manage.py migrate && gunicorn camelq_payslip.wsgi --bind 0.0.0.0:$PORT"
